<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0A0A0F;--card:#111116;--border:#1E1E26;--accent:#FF6B35;--cyan:#22D3EE;--purple:#A78BFA;--green:#34D399;--red:#ff4444;--text:#E8E8ED;--dim:#666;--faint:#444;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono','SF Mono',monospace;overflow-x:hidden;}
input,select,button{font-family:inherit;}
.app{max-width:480px;margin:0 auto;padding:0 16px 40px;min-height:100vh;}
.header{text-align:center;padding:40px 0 16px;}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.25);border-radius:12px;padding:8px 18px;}
.badge span{font-size:13px;font-weight:800;color:var(--accent);letter-spacing:3px;}

.tab-btn.on{background:rgba(255,107,53,0.12);color:var(--accent);}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.mini-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.mini-val{font-size:19px;font-weight:800;color:#fff;}
.mini-unit{font-size:10px;color:#666;}
.mini-label{font-size:9px;color:#555;letter-spacing:1.5px;margin-top:2px;font-weight:600;}
.chart-wrap{background:#0D0D12;border:1px solid var(--border);border-radius:14px;padding:16px 8px 8px;margin-bottom:16px;position:relative;}
.chart-wrap canvas{width:100%;display:block;}
.input-row{display:flex;gap:8px;margin-bottom:12px;}
.inp{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;outline:none;width:100%;}
.inp::placeholder{color:#444;}
.log-btn{background:var(--accent);border:none;border-radius:8px;padding:0 16px;cursor:pointer;color:#fff;font-weight:800;font-size:13px;white-space:nowrap;}
.del-btn{background:rgba(255,70,70,0.1);border:1px solid rgba(255,70,70,0.2);border-radius:8px;padding:0 12px;cursor:pointer;font-size:15px;display:flex;align-items:center;border-style:solid;}
.log-row{display:flex;justify-content:space-between;padding:11px 16px;font-size:13px;}
.log-row+.log-row{border-top:1px solid rgba(255,255,255,0.04);}
.log-date{color:#777;}.log-val{color:#fff;font-weight:700;}
.empty{color:#444;text-align:center;padding:20px;font-size:13px;}
.sec-title{font-size:11px;color:var(--accent);letter-spacing:2px;font-weight:800;margin-bottom:14px;}
.f-label{font-size:11px;color:#666;margin-bottom:4px;font-weight:600;}
.field-row{display:flex;gap:8px;margin-bottom:10px;}
.field-row>div{flex:1;}
.tog-row{display:flex;gap:6px;margin-bottom:12px;}
.tog-btn{flex:1;padding:10px;border-radius:8px;text-align:center;cursor:pointer;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:#555;font-weight:700;font-size:13px;transition:all 0.15s;}
.tog-btn.on{background:rgba(255,107,53,0.12);border-color:rgba(255,107,53,0.35);color:var(--accent);}
.chip-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;-webkit-overflow-scrolling:touch;}
.chip-scroll::-webkit-scrollbar{display:none;}
.chip{padding:8px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:#555;font-weight:600;font-size:12px;transition:all 0.15s;}
.chip.on{background:rgba(255,107,53,0.12);border-color:rgba(255,107,53,0.35);color:var(--accent);}
.res-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.res-card{border:1px solid;border-radius:12px;padding:16px;text-align:center;background:rgba(255,255,255,0.02);}
.res-label{font-size:10px;letter-spacing:2px;font-weight:800;margin-bottom:4px;}
.res-val{font-size:28px;font-weight:800;color:#fff;}
.res-sub{font-size:11px;color:#666;margin-top:2px;}
.macro-row{display:flex;padding:16px;}
.macro-row>div{flex:1;text-align:center;}
.mac-label{font-size:9px;color:#555;letter-spacing:1.5px;font-weight:700;margin-bottom:4px;}
.mac-val{font-size:17px;font-weight:800;color:#fff;}
.mac-sub{font-size:10px;color:#444;margin-top:2px;}

/* Mode toggle */

.mode-btn{flex:1;padding:12px;border-radius:10px;text-align:center;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.03);font-weight:700;font-size:12px;color:#555;transition:all 0.15s;letter-spacing:1px;}

.w-focus{font-size:12px;font-weight:700;}

.day-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:16px;}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;}
.ex-card>div{flex:1;}

.ex-meta{font-size:11px;color:#666;}

.yt-btn{background:rgba(255,0,0,0.1);border:1px solid rgba(255,0,0,0.25);border-radius:8px;padding:6px 10px;text-decoration:none;color:var(--red);font-size:11px;font-weight:700;white-space:nowrap;margin-left:8px;}
.ex-note{font-size:10px;color:#555;margin-top:3px;font-style:italic;}

.sch-row{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:6px;cursor:pointer;gap:12px;transition:all 0.15s;}

.sch-day{font-size:13px;font-weight:700;color:var(--text);}
.sch-day.rest{color:#555;}
.today-tag{font-size:10px;color:var(--accent);font-weight:700;margin-left:8px;}
.sch-info{font-size:11px;color:#444;font-weight:600;margin-top:1px;}
.footer{text-align:center;padding:32px 0;font-size:10px;color:#333;letter-spacing:2px;}
.tab-content{display:none;}.tab-content.active{display:block;}
.tip-card{background:rgba(255,107,53,0.06);border:1px solid rgba(255,107,53,0.2);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:11px;color:#999;line-height:1.5;}
.tip-card strong{color:var(--accent);}
</style>

// ══ SMOOTH CANVAS CHART ═══════════════════════════════════════
function drawChart(container, data){
  if(data.length<2){container.innerHTML="";return;}
  const recent=data.slice(-12);
  const vals=recent.map(d=>d.lbs);
  const mn=Math.min(...vals)-2, mx=Math.max(...vals)+2;
  const range=mx-mn||1;
  const dpr=window.devicePixelRatio||1;
  const W=container.clientWidth-16, H=170;

  container.innerHTML=`<div class="chart-wrap"><canvas id="weightChart" width="${W*dpr}" height="${H*dpr}" style="width:${W}px;height:${H}px;"></canvas></div>`;
  const c=document.getElementById("weightChart").getContext("2d");
  c.scale(dpr,dpr);

  const padL=36,padR=12,padT=20,padB=28;
  const cw=W-padL-padR, ch=H-padT-padB;

  // Grid lines
  c.strokeStyle="rgba(255,255,255,0.05)";c.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=padT+ch*(i/4);
    c.beginPath();c.moveTo(padL,y);c.lineTo(W-padR,y);c.stroke();
  }

  // Y labels
  c.fillStyle="#555";c.font="10px 'JetBrains Mono'";c.textAlign="right";
  for(let i=0;i<=4;i++){
    const v=mx-(mx-mn)*(i/4);
    c.fillText(v.toFixed(1),padL-6,padT+ch*(i/4)+4);
  }

  // Points
  const pts=recent.map((d,i)=>{
    const x=padL+cw*(i/(recent.length-1));
    const y=padT+ch*(1-(d.lbs-mn)/range);
    return{x,y,d};
  });

  // Smooth curve helper (catmull-rom to bezier)
  function smoothPath(ctx,points){
    ctx.moveTo(points[0].x,points[0].y);
    if(points.length===2){ctx.lineTo(points[1].x,points[1].y);return;}
    for(let i=0;i<points.length-1;i++){
      const p0=points[Math.max(0,i-1)];
      const p1=points[i];
      const p2=points[i+1];
      const p3=points[Math.min(points.length-1,i+2)];
      const t=0.33;
      const cp1x=p1.x+(p2.x-p0.x)*t;
      const cp1y=p1.y+(p2.y-p0.y)*t;
      const cp2x=p2.x-(p3.x-p1.x)*t;
      const cp2y=p2.y-(p3.y-p1.y)*t;
      ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2.x,p2.y);
    }
  }

  // Fill gradient
  const grad=c.createLinearGradient(0,padT,0,H-padB);
  grad.addColorStop(0,"rgba(255,107,53,0.35)");
  grad.addColorStop(1,"rgba(255,107,53,0)");
  c.beginPath();
  smoothPath(c,pts);
  c.lineTo(pts[pts.length-1].x,H-padB);
  c.lineTo(pts[0].x,H-padB);
  c.closePath();
  c.fillStyle=grad;c.fill();

  // Stroke line
  c.beginPath();
  smoothPath(c,pts);
  c.strokeStyle="#FF6B35";c.lineWidth=2.5;c.lineJoin="round";c.stroke();

  // Dots + x-labels
  c.textAlign="center";
  pts.forEach((p,i)=>{
    c.beginPath();c.arc(p.x,p.y,4,0,Math.PI*2);c.fillStyle="#FF6B35";c.fill();
    c.beginPath();c.arc(p.x,p.y,2,0,Math.PI*2);c.fillStyle="#0A0A0F";c.fill();
    if(i%Math.max(1,Math.floor(recent.length/6))===0||i===recent.length-1){
      c.fillStyle="#555";c.font="9px 'JetBrains Mono'";
      c.fillText(p.d.date,p.x,H-padB+14);
    }
  });
}

// ══ TABS ══════════════════════════════════════════════════════
function renderTabs(){
  document.getElementById("tabBar").innerHTML=TABS.map(t=>
    `<button class="tab-btn ${currentTab===t.id?"on":""}" onclick="switchTab('${t.id}')">${t.emoji} ${t.label}</button>`
  ).join("");
}
function switchTab(id){
  currentTab=id;selectedDay=null;
  document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
  renderTabs();
  if(id==="weight")renderWeight();if(id==="calories")renderCalories();
  if(id==="workouts")renderWorkouts();if(id==="schedule")renderSchedule();
}

// ══ WEIGHT ════════════════════════════════════════════════════
function renderWeight(){
  const last=weights.length?weights[weights.length-1].lbs:"--";
  const diff=weights.length>=2?(weights[weights.length-1].lbs-weights[0].lbs).toFixed(1):"0.0";
  const dn=parseFloat(diff);
  document.getElementById("weightStats").innerHTML=[
    {l:"CURRENT",v:last,u:"lbs"},{l:"CHANGE",v:(dn>0?"+":"")+diff,u:"lbs",g:dn<0},{l:"ENTRIES",v:weights.length,u:""},
  ].map(s=>`<div class="mini-card"><div class="mini-val" ${s.g?'style="color:var(--green)"':''}>${s.v}<span class="mini-unit"> ${s.u}</span></div><div class="mini-label">${s.l}</div></div>`).join("");
  drawChart(document.getElementById("chartArea"),weights);
  const log=document.getElementById("weightLog");
  if(!weights.length){log.innerHTML='<div class="empty">No entries yet. Log your first weight above.</div>';}
  else{log.innerHTML=[...weights].reverse().slice(0,10).map(w=>`<div class="log-row"><span class="log-date">${w.date}</span><span class="log-val">${w.lbs} lbs</span></div>`).join("");}
}
function addWeight(){
  const inp=document.getElementById("weightInput");const v=parseFloat(inp.value);
  if(isNaN(v)||v<=0)return;const t=new Date();
  weights.push({date:(t.getMonth()+1)+"/"+t.getDate(),lbs:v});saveW();inp.value="";renderWeight();
}
function removeWeight(){if(!weights.length)return;if(confirm("Delete last weight entry?")){weights.pop();saveW();renderWeight();}}

// ══ CALORIES ══════════════════════════════════════════════════
function renderCalories(){
  document.getElementById("sexToggle").innerHTML=["male","female"].map(v=>
    `<div class="tog-btn ${sex===v?"on":""}" onclick="sex='${v}';renderCalories()">${v.charAt(0).toUpperCase()+v.slice(1)}</div>`
  ).join("");
  document.getElementById("actChips").innerHTML=ACT.map((a,i)=>
    `<div class="chip ${actIdx===i?"on":""}" onclick="actIdx=${i};renderCalories()">${a.label}</div>`
  ).join("");
  document.getElementById("goalChips").innerHTML=GOALS.map((g,i)=>
    `<div class="chip ${goalIdx===i?"on":""}" onclick="goalIdx=${i};renderCalories()">${g.label}</div>`
  ).join("");
  const age=parseFloat(document.getElementById("ageInput").value)||0;
  const ft=parseFloat(document.getElementById("ftInput").value)||0;
  const inc=parseFloat(document.getElementById("inInput").value)||0;
  const bw=parseFloat(document.getElementById("bwInput").value)||0;
  const hcm=(ft*12+inc)*2.54,wkg=bw*0.453592;
  const bmr=sex==="male"?10*wkg+6.25*hcm-5*age+5:10*wkg+6.25*hcm-5*age-161;
  const tdee=Math.round(bmr*ACT[actIdx].val);
  const deficit=GOALS[goalIdx].val;const target=tdee-deficit;const protein=Math.round(bw*0.8);
  document.getElementById("calResults").innerHTML=
    `<div class="res-card" style="border-color:#22D3EE44"><div class="res-label" style="color:var(--cyan)">TDEE</div><div class="res-val">${tdee}</div><div class="res-sub">cal/day</div></div>`+
    `<div class="res-card" style="border-color:#FF6B3544"><div class="res-label" style="color:var(--accent)">TARGET</div><div class="res-val">${target}</div><div class="res-sub">cal/day</div></div>`;
  const rate=deficit>0?"~"+(deficit*7/3500).toFixed(1)+" lb/wk":deficit<0?"+"+(Math.abs(deficit)*7/3500).toFixed(1)+" lb/wk":"0 lb/wk";
  document.getElementById("macros").innerHTML=[
    {l:"PROTEIN",v:protein+"g",sub:"0.8g/lb"},{l:"RATE",v:rate,sub:"est."},{l:"BMR",v:Math.round(bmr),sub:"base"},
  ].map(m=>`<div><div class="mac-label">${m.l}</div><div class="mac-val">${m.v}</div><div class="mac-sub">${m.sub}</div></div>`).join("");
}

// ══ WORKOUTS ══════════════════════════════════════════════════
function renderWorkouts(){
  const WO=getWorkouts();
  document.getElementById("modeBar").innerHTML=`<div class="mode-bar">
    <div class="mode-btn ${workoutMode==="gym"?"gym":""}" onclick="workoutMode='gym';selectedDay=null;renderWorkouts()">🏢 GYM</div>
    <div class="mode-btn ${workoutMode==="home"?"home":""}" onclick="workoutMode='home';selectedDay=null;renderWorkouts()">🏠 HOME</div>
  </div>`;
  const list=document.getElementById("workoutList");
  const detail=document.getElementById("workoutDetail");
  if(!selectedDay){
    detail.style.display="none";list.style.display="block";
    const tip=workoutMode==="gym"
      ?"<div class='tip-card'><strong>Gym Plan:</strong> Machine-based and cable exercises. Supports your joints, builds strength safely, and keeps you burning calories. Progress by adding reps before adding weight.</div>"
      :"<div class='tip-card'><strong>Home Plan:</strong> Resistance bands + bodyweight. Grab a set of loop bands ($15-20) and you're set. A sturdy chair is your best friend. Progress from wall push-ups to counter to floor over time.</div>";
    list.innerHTML=tip+Object.entries(WO).map(([name,data])=>
      `<div class="w-card" style="border-color:${data.color}44" onclick="selectedDay='${name}';renderWorkouts()">
        <div><div class="w-name">${name}</div><div class="w-focus" style="color:${data.color}">${data.focus}</div>
        <div class="w-count">${data.exercises.length} exercises</div></div>
        <div style="color:${data.color};font-size:22px">›</div>
      </div>`
    ).join("");
  } else {
    list.style.display="none";detail.style.display="block";
    const wo=WO[selectedDay];
    detail.innerHTML=`
      <div class="back-btn" onclick="selectedDay=null;renderWorkouts()">← Back to Split</div>
      <div class="sec-title" style="color:${wo.color}">${wo.focus.toUpperCase()}</div>
      <div class="day-title">${selectedDay}</div>
      ${wo.exercises.map(ex=>`
        <div class="ex-card">
          <div><div class="ex-name">${ex.name}</div>
          <div class="ex-meta"><span class="ex-sets" style="color:${wo.color}">${ex.sets}</span>  ·  Rest: ${ex.rest}</div>
          ${ex.note?`<div class="ex-note">${ex.note}</div>`:""}</div>
          <a class="yt-btn" href="${ex.yt}" target="_blank" rel="noopener">▶ Form</a>
        </div>
      `).join("")}`;
  }
}

// ══ SCHEDULE ══════════════════════════════════════════════════
function renderSchedule(){
  const WO=getWorkouts();const todayName=new Date().toLocaleDateString("en-US",{weekday:"long"});
  document.getElementById("scheduleList").innerHTML=SCHEDULE.map(sc=>{
    const rest=sc.workout==="Rest";const wo=WO[sc.workout];const today=sc.day===todayName;
    return`<div class="sch-row ${today?"today":""}" onclick="${rest?"":"selectedDay='"+sc.workout+"';switchTab('workouts')"}">
      <div class="sch-badge" style="border-color:${rest?"var(--border)":wo.color+"44"};${rest?"":"color:"+wo.color}">${sc.day.slice(0,2)}</div>
      <div style="flex:1"><div class="sch-day ${rest?"rest":""}">${sc.day}${today?'<span class="today-tag">TODAY</span>':""}</div>
      <div class="sch-info" style="color:${rest?"#444":wo.color}">${rest?"Recovery":sc.workout+" — "+wo.focus}</div></div>
      ${rest?"":'<span style="color:#555;font-size:18px">›</span>'}
    </div>`;
  }).join("");
}

// ══ INIT ══════════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded",()=>{
  ["ageInput","ftInput","inInput","bwInput"].forEach(id=>{
    document.getElementById(id).addEventListener("input",()=>{if(currentTab==="calories")renderCalories();});
  });
  document.getElementById("weightInput").addEventListener("keydown",(e)=>{if(e.key==="Enter")addWeight();});
});
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js");}
renderTabs();renderWeight();renderCalories();renderWorkouts();renderSchedule();
</script>
</body>
</html>
